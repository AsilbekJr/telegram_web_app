services:
  - type: web
    name: telegram-mini-app
    env: node
    buildCommand: npm install --prefix client && npm run build --prefix client && npm install --prefix server
    startCommand: npm start --prefix server
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3000
      - key: MONGODB_URI
        sync: false
      - key: VITE_API_URL
        value: https://telegram-web-app-nnbx.onrender.com
      - key: BOT_TOKEN
        sync: false
      - key: WEB_APP_URL
        sync: false
